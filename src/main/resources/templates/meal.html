<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Add Meal</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/meal.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav-logged">
    <div class="nav-brand">NUTRIPULSE.</div>
    <div class="nav-links">
        <a href="/profile/edit" class="link-item">My Profile Settings</a>
        <a href="/users/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<main class="form-container">
    <div class="card">
        <div class="card-header-row" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <span class="section-title" style="font-size: 1.2rem; color: #fff;"
                  th:text="${editMode} ? 'Edit Meal' : 'Log New Meal'">Log New Meal</span>
        </div>

        <form th:action="${editMode} ? '/meals/edit/' + ${mealId} : '/meals/add?logId=' + ${logId}"
              method="POST"
              th:object="${mealRequest}">
            <input th:if="${editMode}" type="hidden" name="_method" value="PUT">

            <div class="form-group">
                <label for="name">Meal Name</label>
                <input th:field="*{name}"  type="text" id="name" name="name" class="form-control" placeholder="e.g., Grilled Chicken Rice" required>
            </div>

            <div class="form-group">
                <label for="type">Meal Type</label>
                <select th:field="*{type}"  id="type" name="type" class="form-control" required>
                    <option value="" disabled>Select type...</option>
                    <option th:each="t : ${mealTypes}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <p class="error-msg" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
            </div>

            <div class="form-group">
                <label for="calories">Calories (kcal)</label>
                <input th:field="*{calories}" type="number" id="calories" name="calories" class="form-control" placeholder="e.g., 550" min="0" required>
                <p class="error-msg" th:if="${#fields.hasErrors('calories')}" th:errors="*{calories}"></p>
            </div>

            <div class="macro-grid">
                <div class="form-group">
                    <label for="protein">Protein (g)</label>
                    <input  th:field="*{protein}" type="number" id="protein" name="protein" class="form-control" placeholder="0.0" min="0" step="0.1" required>
                    <p class="error-msg" th:if="${#fields.hasErrors('protein')}" th:errors="*{protein}"></p>
                </div>

                <div class="form-group">
                    <label for="carbs">Carbs (g)</label>
                    <input th:field="*{carbs}" type="number" id="carbs" name="carbs" class="form-control" placeholder="0.0" min="0" step="0.1" required>
                    <p class="error-msg" th:if="${#fields.hasErrors('carbs')}" th:errors="*{carbs}"></p>

                </div>

                <div class="form-group">
                    <label for="fats">Fats (g)</label>
                    <input th:field="*{fats}" type="number" id="fats" name="fats" class="form-control" placeholder="0.0" min="0" step="0.1" required>
                    <p class="error-msg" th:if="${#fields.hasErrors('fats')}" th:errors="*{fats}"></p>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/daily-log/{id}(id=${logId})}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit bg-lime" th:text="${editMode} ? 'Update Meal' : 'Save Meal'">Save Meal</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
