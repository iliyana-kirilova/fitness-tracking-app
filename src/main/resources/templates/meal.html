<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Add Meal</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/meal.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav-logged">
    <div class="nav-brand">NUTRIPULSE.</div>
    <div class="nav-links">
        <a href="/profile/edit" class="link-item">My Profile Settings</a>
        <a href="/users/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<main class="form-container">
    <div class="card">
        <div class="card-header-row" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <span class="section-title" style="font-size: 1.2rem; color: #fff;">Log New Meal</span>
        </div>

        <form action="/meals/add" method="POST">
            <div class="form-group">
                <label for="name">Meal Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="e.g., Grilled Chicken Rice" required>
            </div>

            <div class="form-group">
                <label for="type">Meal Type</label>
                <select id="type" name="type" class="form-control" required>
                    <option value="" disabled selected>Select type...</option>
                    <option value="BREAKFAST">Breakfast</option>
                    <option value="LUNCH">Lunch</option>
                    <option value="DINNER">Dinner</option>
                    <option value="SNACK">Snack</option>
                </select>
            </div>

            <div class="form-group">
                <label for="calories">Calories (kcal)</label>
                <input type="number" id="calories" name="calories" class="form-control" placeholder="e.g., 550" min="0" required>
            </div>

            <div class="macro-grid">
                <div class="form-group">
                    <label for="protein">Protein (g)</label>
                    <input type="number" id="protein" name="protein" class="form-control" placeholder="0.0" min="0" step="0.1" required>
                </div>

                <div class="form-group">
                    <label for="carbs">Carbs (g)</label>
                    <input type="number" id="carbs" name="carbs" class="form-control" placeholder="0.0" min="0" step="0.1" required>
                </div>

                <div class="form-group">
                    <label for="fats">Fats (g)</label>
                    <input type="number" id="fats" name="fats" class="form-control" placeholder="0.0" min="0" step="0.1" required>
                </div>
            </div>

            <div class="form-actions">
                <a href="/dashboard" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit bg-lime">Save Meal</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
