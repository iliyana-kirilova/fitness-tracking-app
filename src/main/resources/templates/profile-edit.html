<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Edit Profile</title>
    <link rel="stylesheet" href="/css/profile-edit.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav-logged">
    <div class="nav-brand">NUTRIPULSE.</div>
    <div class="nav-links">
        <a href="/dashboard" class="link-item">Dashboard</a>
        <a href="/home" class="link-item">Home / History</a>
        <a href="/users/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="edit-profile-card">

        <div class="card-header">
            <h3>Edit Profile Settings</h3>
            <p class="card-subtitle">Update your personal information and profile picture</p>
        </div>

        <form th:action="@{/users/{id}/profile/edit(id=${user.id})}" th:object="${user}" th:method="put" class="profile-form">
            <div class="form-grid">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" th:field="*{username}" class="form-input">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" th:field="*{email}" class="form-input">
                </div>

                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" th:field="*{firstName}" class="form-input">
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" th:field="*{lastName}" class="form-input">
                </div>

                <div class="form-group full-width">
                    <label for="profilePicture">Profile Picture URL</label>
                    <input type="url" id="profilePicture" name="profilePicture" th:field="*{profilePicture}" class="form-input">
                </div>

            </div>

            <div class="form-actions">
                <a th:href="@{/home}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit-profile">Save Changes</button>
            </div>
        </form>

    </div>
</div>
</body>
</html>
