<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Create Account</title>
    <link rel="stylesheet" href="/css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="register-card">
    <h2 class="card-title">Create Account</h2>
    <p class="card-subtitle">Join NutriPulse ecosystem</p>

    <form th:action="@{/register}" th:object="${userRegisterRequest}" th:method="post">

        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName" id="firstName" th:field="*{firstName}" required>
                <p class="alert-warning" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></p>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName" id="lastName" th:field="*{lastName}" required>
                <p class="alert-warning" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></p>
            </div>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" id="username" th:field="*{username}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" id="email" th:field="*{email}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <div class="form-group">
            <label>Country</label>
            <select name="country" id="country" th:field="*{country}">

                <option th:value="${null}">Choose country </option>
                <option th:each="country : ${countries}"
                        th:value="${country}"
                        th:text="${country}">
                </option>
            </select>
            <p class="alert-warning" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></p>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" id="password" th:field="*{password}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <p class="redirect-text">Already have an account? <a href="/login">Log in</a></p>
</div>
</body>
</html>
