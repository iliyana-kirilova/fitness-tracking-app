<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Home</title>
    <link rel="stylesheet" href="/css/home.css">
    <script src="/js/home.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav-logged">
    <div class="nav-brand">NUTRIPULSE.</div>
    <div class="nav-links">
        <a th:href="@{/users/{id}/profile(id=${user.getId()})}" class="link-item">My Profile Settings</a>
        <a href="/users/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<main class="home-container">

    <div class="welcome-section">
        <div class="welcome-header">
            <h1>Welcome back, <span class="text-highlight">Legend</span>!</h1>
            <h2>Track your journey and consistency over time.</h2>
        </div>
    </div>

    <div class="side-panel">
        <div class="card profile-card">
            <div class="profile-avatar-wrapper">
                <img th:src="${user.getProfilePicture()}" alt="Profile Picture" class="profile-img">
                <div class="status-badge"></div>
            </div>
            <div class="profile-info">
                <h3 class="profile-name"
                    th:text="|${user.getFirstName()} ${user.getLastName()}|">
                </h3>
                <span class="profile-username" th:text="${user.getUsername()}"></span>
            </div>
            <hr class="divider">
            <div class="profile-meta">
                <div class="meta-item">
                    <span class="meta-label">First Name</span>
                    <span class="meta-value" th:text="${user.getFirstName()}"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Last Name</span>
                    <span class="meta-value" th:text="${user.getLastName()}"></span>
                </div>
            </div>
            <a href="/dashboard" class="btn-view-dashboard">Go to Live Dashboard →</a>
        </div>
    </div>

    <div class="main-panel">
        <div class="card logs-container-card">
            <div class="card-header-row">
                <div>
                    <span class="section-title">Daily Logs History</span>
                    <div class="filter-tabs">
                        <button class="tab-btn active">All Time</button>
                        <button class="tab-btn">Last 7 Days</button>
                    </div>
                </div>
                <a th:href="@{/daily-log/create}" class="btn-action-sm bg-lime" style="text-decoration: none;">+ Add New Daily Log</a>
            </div>

            <div class="logs-list">

                <div class="log-card" th:each="log : ${logs}">
                    <div class="log-card-header">
                        <div class="log-date-wrapper">
                            <span class="log-icon">📅</span>
                            <a th:href="@{/daily-log/{id}(id=${log.id})}" th:text="${log.logDate}" class="log-date-link"></a>
                            <span class="today-tag">Today</span>
                        </div>
                        <form th:action="@{/daily-log/delete/{id}(id=${log.id})}" method="POST" onsubmit="return confirm('Are you sure you want to delete this log?');">
                            <button type="submit" class="btn-delete-log" title="Delete this daily log">✕ Delete</button>
                        </form>
                    </div>

                    <a th:href="@{/daily-log/{id}(id=${log.id})}" class="log-card-clickable-body">
                        <div class="log-card-body">
                            <div class="main-stats">
                                <div class="mini-stat">
                                    <span class="mini-label">Calories</span>
                                    <span class="mini-value color-eaten"  th:text="${log.caloriesConsumed}"> <small>kcal</small></span>
                                </div>
                                <div class="mini-stat">
                                    <span class="mini-label">Water Intake</span>
                                    <span class="mini-value color-cyan" th:text="${log.waterIntake}"> <small>ml</small></span>
                                </div>
                            </div>

                            <div class="macros-strip">
                                <div class="macro-bar-item">
                                    <div class="macro-labels"><span>Protein</span><span>140g</span></div>
                                    <div class="macro-progress-bg" th:text="${log.proteinConsumed}"><div class="macro-progress-fill p-bg" style="width: 85%;"></div></div>
                                </div>
                                <div class="macro-bar-item">
                                    <div class="macro-labels"><span>Carbs</span><span>210g</span></div>
                                    <div class="macro-progress-bg" th:text="${log.carbsConsumed}"><div class="macro-progress-fill c-bg" style="width: 65%;"></div></div>
                                </div>
                                <div class="macro-bar-item">
                                    <div class="macro-labels"><span>Fats</span><span>65g</span></div>
                                    <div class="macro-progress-bg" th:text="${log.fatsConsumed}"><div class="macro-progress-fill f-bg" style="width: 70%;"></div></div>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
