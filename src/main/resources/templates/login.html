<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Sign In</title>
    <link rel="stylesheet" href="/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-card">
    <h2 class="card-title">Welcome Back</h2>
    <p class="card-subtitle">Log in to pulse your metrics</p>

    <form th:action="@{/login}" th:object="${userLoginRequest}" th:method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" id="username" th:field="*{username}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" id="password" th:field="*{password}" required>
            <p class="alert-warning" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <p class="redirect-text">Don't have an account? <a href="/register">Sign up</a></p>
</div>
</body>
</html>
