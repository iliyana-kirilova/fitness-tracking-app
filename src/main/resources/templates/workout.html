</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Add Workout</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/workout.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav-logged">
    <div class="nav-brand">NUTRIPULSE.</div>
    <div class="nav-links">
        <a href="/profile/edit" class="link-item">My Profile Settings</a>
        <a href="/users/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<main class="form-container">
    <div class="card">
        <div class="card-header-row" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <span class="section-title" style="font-size: 1.2rem; color: #fff;">Log New Workout</span>
        </div>

        <form action="/workouts/add" method="POST">
            <div class="form-group">
                <label for="type">Workout Type</label>
                <select id="type" name="type" class="form-control" required>
                    <option value="" disabled selected>Select type...</option>
                    <option value="CARDIO">Cardio</option>
                    <option value="STRENGTH">Strength Training</option>
                    <option value="HIIT">HIIT</option>
                    <option value="YOGA">Yoga / Flexibility</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="duration">Duration (minutes)</label>
                <input type="number" id="duration" name="duration" class="form-control" placeholder="e.g., 45" min="1" required>
            </div>

            <div class="form-group">
                <label for="caloriesBurned">Calories Burned (kcal)</label>
                <input type="number" id="caloriesBurned" name="caloriesBurned" class="form-control" placeholder="e.g., 350" min="0" required>
            </div>

            <div class="form-actions">
                <a href="/dashboard" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit bg-cyan">Save Workout</button>
            </div>
        </form>
    </div>
</main>


</body>
</html>
