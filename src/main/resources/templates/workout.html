<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPulse - Add Workout</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/workout.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav-logged">
    <div class="nav-brand">NUTRIPULSE.</div>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </div>
</nav>

<main class="form-container">
    <div class="card">
        <div class="card-header-row" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
            <span  th:text="${editMode} ? 'Edit Workout' : 'Log New Workout'" class="section-title" style="font-size: 1.2rem; color: #fff;">Log New Workout</span>
        </div>

        <form th:action="${editMode} ? '/workouts/edit/' + ${workoutId} : '/workouts/add?logId=' + ${logId}"
              method="POST"
              th:object="${workoutRequest}">
            <div class="form-group">
                <label for="type">Workout Type</label>
                <select id="type"  th:field="*{type}" name="type" class="form-control">
                    <option th:value="${null}">Select type...</option>
                    <option th:each="t : ${workoutTypes}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <p class="error-msg" th:if="${#fields.hasErrors('type')}"  th:errors="*{type}"></p>
            </div>

            <div class="form-group">
                <label for="duration">Duration (minutes)</label>
                <input th:field="*{duration}" type="number" id="duration" name="duration" class="form-control" placeholder="e.g., 45" min="1">
                <p class="error-msg" th:if="${#fields.hasErrors('duration')}"
                      th:errors="*{duration}"></p>
            </div>

            <div class="form-group">
                <label for="caloriesBurned">Calories Burned (kcal)</label>
                <input  th:field="*{caloriesBurned}" type="number" id="caloriesBurned" name="caloriesBurned" class="form-control" placeholder="e.g., 350" min="0">
                <p class="error-msg" th:if="${#fields.hasErrors('caloriesBurned')}" th:errors="*{caloriesBurned}"></p>
            </div>

            <div class="form-actions">
                <a th:href="@{/daily-log/{id}(id=${logId})}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit bg-cyan"
                        th:text="${editMode} ? 'Update Workout' : 'Save Workout'">Save Workout</button>
            </div>
        </form>
    </div>
</main>


</body>
</html>
